# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "8d535823470ca553c36b5e61bd8dc481"
name = "Approvefy"
application_url = "https://approvefy-app.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "customers/create" ]
  uri = "/webhooks/customers_create"

[access_scopes]
scopes = "write_products,read_customers,write_customers,write_app_proxy,read_locales"

[auth]
redirect_urls = [ "https://approvefy-app.vercel.app/api/auth" ]

[app_proxy]
url = "https://approvefy-app.vercel.app/api"
subpath = "customer-approval"
prefix = "apps"
